name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff
        run: ruff check

      - name: Run pytest with coverage
        run: pytest --tb=short --cov=src/semantic_kv --cov-report=xml

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Build docs if configured
        shell: bash
        run: |
          if [[ -f mkdocs.yml || -f docs/mkdocs.yml ]]; then
            pip install mkdocs
            mkdocs build --strict
          elif [[ -f docs/conf.py ]]; then
            pip install sphinx
            sphinx-build -b html docs docs/_build/html
          else
            echo "No docs build configuration found; skipping docs build."
          fi
