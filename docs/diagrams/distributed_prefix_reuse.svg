<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520"><rect width="980" height="520" fill="#090d18"/><text x="48" y="58" fill="#f8fafc" font-family="Inter,Segoe UI,sans-serif" font-size="30" font-weight="700">Distributed Prefix Reuse</text><g font-family="Inter,Segoe UI,sans-serif"><rect x="70" y="130" width="220" height="90" rx="8" fill="#111827" stroke="#38bdf8"/><text x="98" y="166" fill="#e0f2fe" font-size="18">1000 Sessions</text><text x="98" y="192" fill="#94a3b8" font-size="13">same enterprise prompt</text><rect x="380" y="100" width="240" height="120" rx="8" fill="#10201a" stroke="#22c55e"/><text x="408" y="138" fill="#dcfce7" font-size="18">Global Prefix Index</text><text x="408" y="164" fill="#94a3b8" font-size="13">hash → canonical rack</text><text x="408" y="188" fill="#94a3b8" font-size="13">fanout + multicast accounting</text><rect x="700" y="130" width="220" height="90" rx="8" fill="#111827" stroke="#a78bfa"/><text x="728" y="166" fill="#ede9fe" font-size="18">Rack-Local Cache</text><text x="728" y="192" fill="#94a3b8" font-size="13">one copy per cluster</text><rect x="380" y="320" width="240" height="90" rx="8" fill="#21150e" stroke="#f97316"/><text x="408" y="356" fill="#ffedd5" font-size="18">Avoided Traffic</text><text x="408" y="382" fill="#94a3b8" font-size="13">duplicates + cross-rack bytes</text></g><path d="M290 175 L380 160" stroke="#22c55e" stroke-width="3"/><path d="M620 160 L700 175" stroke="#22c55e" stroke-width="3"/><path d="M500 220 L500 320" stroke="#f97316" stroke-width="3"/></svg>
